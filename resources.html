    <!-- SECTION: Quantum Tools & Simulators -->
    <section class="res-section">
      <h2 class="res-section-label">Quantum Tools &amp; Simulators</h2>

      <div class="res-grid">

        <article class="res-card">
          <div class="res-card-top">
            <span class="res-tag">Simulator</span>
            <a href="https://algassert.com/quirk" target="_blank" rel="noopener" class="res-link-icon" aria-label="Open Quirk">↗</a>
          </div>
          <h3 class="res-card-title">Quirk</h3>
          <p class="res-card-desc">
            An open-source drag-and-drop quantum circuit simulator that runs entirely in the browser.
            You can build, visualise, and share quantum circuits instantly — no install, no account.
            The real-time state visualisation is what makes it special; you literally watch the qubits evolve.
          </p>
          <a href="https://algassert.com/quirk" target="_blank" rel="noopener" class="res-card-url">algassert.com/quirk</a>
        </article>

        <article class="res-card">
          <div class="res-card-top">
            <span class="res-tag">Interactive Book</span>
            <a href="https://oreilly-qc.github.io/#" target="_blank" rel="noopener" class="res-link-icon" aria-label="Open QC Playground">↗</a>
          </div>
          <h3 class="res-card-title">O'Reilly QC Playground</h3>
          <p class="res-card-desc">
            The companion site to the O'Reilly book <em>Programming Quantum Computers</em>.
            Every chapter comes with live, runnable code samples across multiple backends
            (QCEngine, Qiskit, Cirq, Q#). An excellent bridge between textbook theory and
            practical circuit writing.
          </p>
          <a href="https://oreilly-qc.github.io/#" target="_blank" rel="noopener" class="res-card-url">oreilly-qc.github.io</a>
        </article>

        <article class="res-card">
          <div class="res-card-top">
            <span class="res-tag">Visual Learning</span>
            <a href="https://www.st-andrews.ac.uk/physics/quvis/index.html" target="_blank" rel="noopener" class="res-link-icon" aria-label="Open QuVis">↗</a>
          </div>
          <h3 class="res-card-title">QuVis — St Andrews</h3>
          <p class="res-card-desc">
            A suite of browser-based simulations from the University of St Andrews covering
            quantum mechanics from ground up — superposition, measurement, spin, entanglement,
            and more. Beautifully designed for intuition-building rather than just computation.
            I use this to re-anchor ideas when theory gets abstract.
          </p>
          <a href="https://www.st-andrews.ac.uk/physics/quvis/index.html" target="_blank" rel="noopener" class="res-card-url">st-andrews.ac.uk · QuVis</a>
        </article>

      </div>
    </section>
